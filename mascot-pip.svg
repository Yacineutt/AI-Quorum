<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 380" width="340" height="380">
<defs>
  <radialGradient id="p_body" cx="0.34" cy="0.26" r="0.82">
    <stop offset="0" stop-color="#9AE6FF"/><stop offset="0.42" stop-color="#38BDF8"/>
    <stop offset="0.78" stop-color="#0C87C9"/><stop offset="1" stop-color="#075985"/>
  </radialGradient>
  <linearGradient id="p_rim" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#DFF6FF" stop-opacity="0"/><stop offset="0.72" stop-color="#DFF6FF" stop-opacity="0"/>
    <stop offset="1" stop-color="#BEEBFF" stop-opacity="0.85"/>
  </linearGradient>
  <radialGradient id="p_spec" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/><stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.18"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="p_shadow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#062338" stop-opacity="0.55"/><stop offset="0.6" stop-color="#062338" stop-opacity="0.18"/><stop offset="1" stop-color="#062338" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="p_visor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0B2A44"/><stop offset="0.5" stop-color="#04121F"/><stop offset="1" stop-color="#0A2338"/>
  </linearGradient>
  <linearGradient id="p_gloss" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="p_eye" cx="0.35" cy="0.3" r="0.75">
    <stop offset="0" stop-color="#CFFAFE"/><stop offset="0.5" stop-color="#67E8F9"/><stop offset="1" stop-color="#0E7490"/>
  </radialGradient>
  <linearGradient id="p_board" x1="0" y1="0" x2="0.6" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.5" stop-color="#EEF6FF"/><stop offset="1" stop-color="#CBDCEC"/>
  </linearGradient>
  <linearGradient id="p_arm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#3FB4E8"/><stop offset="1" stop-color="#0C7BB5"/>
  </linearGradient>
  <linearGradient id="p_bub" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#DCE9F7"/>
  </linearGradient>
</defs>

<!-- 3 model speech bubbles (the "many models" idea, instantly readable) -->
<g>
  <g transform="translate(44,50)">
    <rect x="-30" y="-20" width="60" height="40" rx="14" fill="url(#p_bub)"/>
    <path d="M6,18 L14,32 L20,17 Z" fill="#DCE9F7"/>
    <path d="M-13,2 L-4,11 L13,-9" fill="none" stroke="#12A374" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(170,30)">
    <rect x="-30" y="-20" width="60" height="40" rx="14" fill="url(#p_bub)"/>
    <path d="M-4,18 L2,32 L10,17 Z" fill="#DCE9F7"/>
    <path d="M-13,2 L-4,11 L13,-9" fill="none" stroke="#12A374" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(296,50)">
    <rect x="-30" y="-20" width="60" height="40" rx="14" fill="url(#p_bub)"/>
    <path d="M-18,18 L-22,32 L-6,17 Z" fill="#DCE9F7"/>
    <path d="M-11,-9 L11,11 M11,-9 L-11,11" stroke="#E11D48" stroke-width="6" stroke-linecap="round"/>
  </g>
</g>

<ellipse cx="170" cy="352" rx="92" ry="18" fill="url(#p_shadow)"/>

<!-- legs -->
<g>
  <rect x="130" y="304" width="28" height="38" rx="14" fill="url(#p_arm)"/>
  <rect x="182" y="304" width="28" height="38" rx="14" fill="url(#p_arm)"/>
  <ellipse cx="144" cy="343" rx="21" ry="9" fill="#0E7490"/><ellipse cx="144" cy="340" rx="19" ry="7.5" fill="#22B8E0"/>
  <ellipse cx="196" cy="343" rx="21" ry="9" fill="#0E7490"/><ellipse cx="196" cy="340" rx="19" ry="7.5" fill="#22B8E0"/>
</g>

<!-- antenna (listening) -->
<path d="M170,132 L170,104" stroke="#0C87C9" stroke-width="6" stroke-linecap="round"/>
<circle cx="170" cy="98" r="11" fill="#052A1E"/>
<circle cx="170" cy="98" r="9" fill="#34D399"/>
<circle cx="167" cy="95" r="3.4" fill="#ECFDF5" opacity="0.95"/>

<!-- BODY (round, volumetric) -->
<circle cx="170" cy="234" r="88" fill="url(#p_body)"/>
<circle cx="170" cy="234" r="88" fill="url(#p_rim)"/>
<ellipse cx="140" cy="196" rx="38" ry="24" fill="url(#p_spec)"/>

<!-- face visor -->
<rect x="112" y="176" width="116" height="56" rx="28" fill="url(#p_visor)" stroke="#2A6F96" stroke-width="2"/>
<rect x="118" y="181" width="104" height="20" rx="10" fill="url(#p_gloss)"/>
<g>
  <ellipse cx="146" cy="206" rx="16" ry="17" fill="url(#p_eye)"/>
  <ellipse cx="194" cy="206" rx="16" ry="17" fill="url(#p_eye)"/>
  <circle cx="141" cy="200" r="5.5" fill="#F0FEFF" opacity="0.95"/>
  <circle cx="189" cy="200" r="5.5" fill="#F0FEFF" opacity="0.95"/>
</g>
<path d="M156,244 Q170,256 184,244" fill="none" stroke="#04121F" stroke-width="4" stroke-linecap="round"/>
<ellipse cx="110" cy="226" rx="11" ry="7" fill="#7DD3FC" opacity="0.4"/>
<ellipse cx="230" cy="226" rx="11" ry="7" fill="#7DD3FC" opacity="0.4"/>

<!-- ARM holding the TALLY BOARD (self-explanatory: it counts votes) -->
<path d="M242,252 Q276,254 282,238" fill="none" stroke="url(#p_arm)" stroke-width="18" stroke-linecap="round"/>
<g transform="translate(268,220) rotate(8)">
  <rect x="-34" y="-52" width="68" height="92" rx="10" fill="url(#p_board)" stroke="#9DB4C8" stroke-width="2"/>
  <rect x="-14" y="-60" width="28" height="14" rx="6" fill="#7C93A8"/>
  <!-- tally rows: 3 agree, 1 dissent -->
  <g stroke-linecap="round">
    <path d="M-22,-32 L-14,-24 L-2,-40" fill="none" stroke="#12A374" stroke-width="5"/>
    <rect x="6" y="-36" width="22" height="5" rx="2.5" fill="#B9CBDA"/>
    <path d="M-22,-10 L-14,-2 L-2,-18" fill="none" stroke="#12A374" stroke-width="5"/>
    <rect x="6" y="-14" width="22" height="5" rx="2.5" fill="#B9CBDA"/>
    <path d="M-22,12 L-14,20 L-2,4" fill="none" stroke="#12A374" stroke-width="5"/>
    <rect x="6" y="8" width="22" height="5" rx="2.5" fill="#B9CBDA"/>
    <path d="M-22,26 L-8,40 M-8,26 L-22,40" stroke="#E11D48" stroke-width="5"/>
    <rect x="6" y="30" width="14" height="5" rx="2.5" fill="#D6E1EB"/>
  </g>
</g>

<!-- left arm -->
<path d="M98,252 Q66,256 62,238" fill="none" stroke="url(#p_arm)" stroke-width="18" stroke-linecap="round"/>
<circle cx="60" cy="232" r="13" fill="url(#p_body)"/>
<circle cx="60" cy="232" r="13" fill="url(#p_rim)"/>
</svg>
