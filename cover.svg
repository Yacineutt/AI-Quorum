<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
<defs>
  <radialGradient id="amb" cx="0.28" cy="0.5" r="0.68">
    <stop offset="0" stop-color="#0d2a44"/><stop offset="0.42" stop-color="#08122a"/><stop offset="1" stop-color="#030409"/>
  </radialGradient>
  <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#22D3EE"/><stop offset="0.55" stop-color="#38BDF8"/><stop offset="1" stop-color="#7C5CFF"/>
  </linearGradient>
  <linearGradient id="txtg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.6" stop-color="#EAF6FF"/><stop offset="1" stop-color="#7DD3FC"/>
  </linearGradient>
  <filter id="bL" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="30"/></filter>
  <filter id="bM" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>
  <filter id="bS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4.5"/></filter>
  <pattern id="mesh" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#38BDF8" stroke-opacity="0.055" stroke-width="1"/>
  </pattern>
  <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.5"/></linearGradient>
</defs>

<rect width="1280" height="640" fill="url(#amb)"/>
<rect width="1280" height="640" fill="url(#mesh)"/>
<ellipse cx="330" cy="320" rx="330" ry="310" fill="#22D3EE" opacity="0.13" filter="url(#bL)"/>
<ellipse cx="332" cy="318" rx="140" ry="140" fill="#7C5CFF" opacity="0.13" filter="url(#bL)"/>
<rect x="640" y="0" width="640" height="640" fill="url(#fade)"/>

<g transform="translate(332,320)">
  <!-- orbit rings -->
  <circle r="196" fill="none" stroke="#38BDF8" stroke-opacity="0.14" stroke-width="1"/>
  <circle r="150" fill="none" stroke="#7C5CFF" stroke-opacity="0.12" stroke-width="1"/>

  <!-- 6 model nodes, converging beams -->
  <g fill="none" stroke-linecap="round">
    <path d="M0,-172 L0,-62" stroke="#22D3EE" stroke-width="9" opacity="0.35" filter="url(#bM)"/><path d="M0,-172 L0,-62" stroke="#A5F3FC" stroke-width="2" opacity="0.85"/>
    <path d="M149,-86 L54,-31" stroke="#22D3EE" stroke-width="9" opacity="0.35" filter="url(#bM)"/><path d="M149,-86 L54,-31" stroke="#A5F3FC" stroke-width="2" opacity="0.85"/>
    <path d="M149,86 L54,31" stroke="#34D399" stroke-width="9" opacity="0.32" filter="url(#bM)"/><path d="M149,86 L54,31" stroke="#A7F3D0" stroke-width="2" opacity="0.8"/>
    <path d="M0,172 L0,62" stroke="#7C5CFF" stroke-width="9" opacity="0.35" filter="url(#bM)"/><path d="M0,172 L0,62" stroke="#C4B5FD" stroke-width="2" opacity="0.85"/>
    <path d="M-149,86 L-54,31" stroke="#7C5CFF" stroke-width="9" opacity="0.32" filter="url(#bM)"/><path d="M-149,86 L-54,31" stroke="#C4B5FD" stroke-width="2" opacity="0.8"/>
    <path d="M-149,-86 L-54,-31" stroke="#F59E0B" stroke-width="8" opacity="0.26" filter="url(#bM)"/><path d="M-149,-86 L-54,-31" stroke="#FCD34D" stroke-width="1.8" opacity="0.55" stroke-dasharray="4 7"/>
  </g>

  <!-- node chips -->
  <g>
    <g transform="translate(0,-172)"><circle r="22" fill="#22D3EE" opacity="0.45" filter="url(#bM)"/><circle r="15" fill="#071a2b" stroke="#67E8F9" stroke-width="2.4"/><circle r="4.5" fill="#ECFEFF"/></g>
    <g transform="translate(149,-86)"><circle r="20" fill="#22D3EE" opacity="0.4" filter="url(#bM)"/><circle r="14" fill="#071a2b" stroke="#67E8F9" stroke-width="2.2"/><circle r="4" fill="#ECFEFF"/></g>
    <g transform="translate(149,86)"><circle r="20" fill="#34D399" opacity="0.4" filter="url(#bM)"/><circle r="14" fill="#071a2b" stroke="#6EE7B7" stroke-width="2.2"/><circle r="4" fill="#ECFDF5"/></g>
    <g transform="translate(0,172)"><circle r="20" fill="#7C5CFF" opacity="0.42" filter="url(#bM)"/><circle r="14" fill="#0d0a24" stroke="#C4B5FD" stroke-width="2.2"/><circle r="4" fill="#F5F3FF"/></g>
    <g transform="translate(-149,86)"><circle r="20" fill="#7C5CFF" opacity="0.4" filter="url(#bM)"/><circle r="14" fill="#0d0a24" stroke="#C4B5FD" stroke-width="2.2"/><circle r="4" fill="#F5F3FF"/></g>
    <!-- dissenting / failed node: dimmer, amber, dashed ring -->
    <g transform="translate(-149,-86)"><circle r="16" fill="#F59E0B" opacity="0.22" filter="url(#bM)"/><circle r="13" fill="#1a1206" stroke="#FCD34D" stroke-width="1.8" stroke-dasharray="3 4" opacity="0.75"/><circle r="3.2" fill="#FDE68A" opacity="0.8"/></g>
  </g>

  <!-- consensus core -->
  <circle r="74" fill="#22D3EE" opacity="0.28" filter="url(#bL)"/>
  <circle r="56" fill="none" stroke="url(#neon)" stroke-width="12" opacity="0.75" filter="url(#bM)"/>
  <circle r="56" fill="#050b1e" fill-opacity="0.9" stroke="url(#neon)" stroke-width="3"/>
  <circle r="56" fill="none" stroke="#F0FBFF" stroke-width="1.1" opacity="0.85"/>
  <circle r="70" fill="none" stroke="#34D399" stroke-width="1.6" opacity="0.5" stroke-dasharray="3 7"/>
  <text x="0" y="-2" text-anchor="middle" font-family="DejaVu Sans" font-weight="bold" font-size="30" fill="#F0FBFF">0.87</text>
  <text x="0" y="22" text-anchor="middle" font-family="DejaVu Sans" font-size="11" fill="#7FB6D6" letter-spacing="1.5">AGREEMENT</text>
</g>

<!-- WORDMARK (100px, largeur mesuree 450px, x=620 -> fin 1070) -->
<g font-family="DejaVu Sans" font-weight="bold">
  <text x="620" y="272" font-size="100" fill="#22D3EE" opacity="0.55" filter="url(#bL)">Quorum</text>
  <text x="620" y="272" font-size="100" fill="#38BDF8" opacity="0.45" filter="url(#bS)">Quorum</text>
  <text x="620" y="272" font-size="100" fill="url(#txtg)">Quorum</text>
</g>
<rect x="622" y="300" width="140" height="5" rx="2.5" fill="url(#neon)" opacity="0.8" filter="url(#bS)"/>
<rect x="622" y="300" width="140" height="5" rx="2.5" fill="url(#neon)"/>

<g font-family="DejaVu Sans">
  <text x="622" y="360" font-size="28" fill="#CFE9FF">One prompt. Every model.</text>
  <text x="622" y="398" font-size="28" fill="#CFE9FF">Real agreement, measured.</text>
  <text x="622" y="456" font-size="18" fill="#7E9CC0">Ask them all &#183; score the consensus &#183; zero deps</text>
</g>
<g font-family="DejaVu Sans">
  <rect x="622" y="490" width="3" height="20" rx="1.5" fill="#22D3EE"/>
  <text x="638" y="506" font-size="16" fill="#7189AE">by Yacine Mahboub &#183; Founder of WEVIA</text>
</g>
<rect x="1" y="1" width="1278" height="638" fill="none" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="2"/>
</svg>
