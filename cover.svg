    <g transform="translate(236,234)"><rect x="0" y="-17" width="128" height="34" rx="11" fill="#0a2236" stroke="#22D3EE" stroke-width="1.4"/><circle cx="18" cy="0" r="6" fill="#22D3EE"/><text x="34" y="4.6" font-size="12" fill="#CFE9FF">model B</text><text x="112" y="4.6" text-anchor="end" font-size="10.5" fill="#5FA8CC">ok</text></g>
    <g transform="translate(236,290)"><rect x="0" y="-17" width="128" height="34" rx="11" fill="#0a2236" stroke="#22D3EE" stroke-width="1.4"/><circle cx="18" cy="0" r="6" fill="#22D3EE"/><text x="34" y="4.6" font-size="12" fill="#CFE9FF">model C</text><text x="112" y="4.6" text-anchor="end" font-size="10.5" fill="#5FA8CC">ok</text></g>
    <g transform="translate(236,346)"><rect x="0" y="-17" width="128" height="34" rx="11" fill="#0a2236" stroke="#22D3EE" stroke-width="1.4"/><circle cx="18" cy="0" r="6" fill="#22D3EE"/><text x="34" y="4.6" font-size="12" fill="#CFE9FF">model D</text><text x="112" y="4.6" text-anchor="end" font-size="10.5" fill="#5FA8CC">ok</text></g>
    <g transform="translate(236,402)"><rect x="0" y="-17" width="128" height="34" rx="11" fill="#211705" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="4 4"/><circle cx="18" cy="0" r="6" fill="none" stroke="#FCD34D" stroke-width="1.8"/><text x="34" y="4.6" font-size="12" fill="#FDE68A">model E</text><text x="112" y="4.6" text-anchor="end" font-size="10.5" fill="#C08A2E">429</text></g>
  </g>

  <!-- fan-in -->
